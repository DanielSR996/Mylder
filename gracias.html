<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script>

  <title>Gracias | Mylder Solutions</title>
  <meta name="description" content="Gracias por contactarnos. Pronto nos pondremos en contacto contigo." />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" href="./assets/favicon-mylder.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:ital,wght@0,500;0,600;0,700;0,800;1,600&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./css/digital-serenity.css" />
</head>
<body class="thanks-page serenity-page">
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PR9NJLZC" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <header class="header" id="inicio">
    <a class="brand" href="./index.html#inicio" aria-label="Ir al inicio">
      <img class="brand-mark" src="./assets/logo-isotipo.png" alt="Isotipo Mylder Solutions" />
      <span>MYLDER SOLUTIONS</span>
    </a>
  </header>

  <main class="serenity" aria-labelledby="serenityTitle">
    <svg class="serenity__grid-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <pattern id="serenityGrid" width="60" height="60" patternUnits="userSpaceOnUse">
          <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(100, 116, 139, 0.1)" stroke-width="0.5" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#serenityGrid)" />
      <line x1="0" y1="20%" x2="100%" y2="20%" class="grid-line" style="animation-delay: 0.5s" />
      <line x1="0" y1="80%" x2="100%" y2="80%" class="grid-line" style="animation-delay: 1s" />
      <line x1="20%" y1="0" x2="20%" y2="100%" class="grid-line" style="animation-delay: 1.5s" />
      <line x1="80%" y1="0" x2="80%" y2="100%" class="grid-line" style="animation-delay: 2s" />
      <line x1="50%" y1="0" x2="50%" y2="100%" class="grid-line" style="animation-delay: 2.5s; opacity: 0.05" />
      <line x1="0" y1="50%" x2="100%" y2="50%" class="grid-line" style="animation-delay: 3s; opacity: 0.05" />
      <circle cx="20%" cy="20%" r="2" class="detail-dot" style="animation-delay: 3s" />
      <circle cx="80%" cy="20%" r="2" class="detail-dot" style="animation-delay: 3.2s" />
      <circle cx="20%" cy="80%" r="2" class="detail-dot" style="animation-delay: 3.4s" />
      <circle cx="80%" cy="80%" r="2" class="detail-dot" style="animation-delay: 3.6s" />
      <circle cx="50%" cy="50%" r="1.5" class="detail-dot" style="animation-delay: 4s" />
    </svg>

    <div class="serenity__corner serenity__corner--tl" aria-hidden="true"><span class="serenity__corner-dot"></span></div>
    <div class="serenity__corner serenity__corner--tr" aria-hidden="true"><span class="serenity__corner-dot"></span></div>
    <div class="serenity__corner serenity__corner--bl" aria-hidden="true"><span class="serenity__corner-dot"></span></div>
    <div class="serenity__corner serenity__corner--br" aria-hidden="true"><span class="serenity__corner-dot"></span></div>

    <span class="serenity__float" style="top: 25%; left: 15%; animation-delay: 0.5s" aria-hidden="true"></span>
    <span class="serenity__float" style="top: 60%; left: 85%; animation-delay: 1s" aria-hidden="true"></span>
    <span class="serenity__float" style="top: 40%; left: 10%; animation-delay: 1.5s" aria-hidden="true"></span>
    <span class="serenity__float" style="top: 75%; left: 90%; animation-delay: 2s" aria-hidden="true"></span>

    <div class="serenity__content">
      <div class="serenity__top">
        <p class="serenity__kicker">
          <span class="word-animate" data-delay="0">Confirmación</span>
          <span class="word-animate" data-delay="300">enviada.</span>
        </p>
        <div class="serenity__divider" aria-hidden="true"></div>
      </div>

      <div class="serenity__hero">
        <h1 id="serenityTitle" class="serenity__title serenity__title--decorated">
          <div class="serenity__title-line">
            <span class="word-animate" data-delay="700">Pronto</span>
            <span class="word-animate" data-delay="850">nos</span>
            <span class="word-animate" data-delay="1000">pondremos</span>
            <span class="word-animate" data-delay="1150">en</span>
            <span class="word-animate" data-delay="1300">contacto</span>
            <span class="word-animate" data-delay="1450">contigo.</span>
          </div>
        </h1>
        <span class="serenity__side-line serenity__side-line--left" aria-hidden="true"></span>
        <span class="serenity__side-line serenity__side-line--right" aria-hidden="true"></span>

        <div class="serenity__actions">
          <a class="btn btn-primary" href="./index.html#inicio">Volver al inicio</a>
          <a class="btn btn-ghost" href="./index.html#servicios">Ver servicios</a>
        </div>
      </div>

      <div class="serenity__bottom">
        <div class="serenity__divider" aria-hidden="true"></div>
        <p class="serenity__kicker">
          <span class="word-animate" data-delay="3000">Tu</span>
          <span class="word-animate" data-delay="3200">mensaje</span>
          <span class="word-animate" data-delay="3400">ya</span>
          <span class="word-animate" data-delay="3550">está</span>
          <span class="word-animate" data-delay="3700">con</span>
          <span class="word-animate" data-delay="3850">nuestro</span>
          <span class="word-animate" data-delay="4000">equipo.</span>
        </p>
        <div class="serenity__dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

    <div class="serenity__mouse-glow" aria-hidden="true"></div>
  </main>

  <footer class="footer">
    <div class="footer-bottom">
      <p>Mylder Solutions | <span class="js-current-year">2026</span> • Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="./js/digital-serenity.js" defer></script>
  <script src="./tab-attention.js" defer></script>
  <script>
    document.querySelectorAll(".js-current-year").forEach((node) => {
      node.textContent = String(new Date().getFullYear());
    });
    (() => {
      const { pathname, search, hash } = window.location;
      if (pathname.endsWith("/index.html")) {
        history.replaceState(null, "", pathname.replace(/index\.html$/, "") + search + hash);
        return;
      }
      if (pathname.endsWith(".html")) {
        history.replaceState(null, "", pathname.slice(0, -5) + search + hash);
      }
    })();
  </script>
</body>
</html>
