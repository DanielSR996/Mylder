    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#080d1a;border-radius:18px;border:1px solid rgba(243,196,0,0.28);overflow:hidden;">

              <p style="text-align:center;margin:28px 0;">
