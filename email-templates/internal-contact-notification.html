<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo contacto web | Mylder Solutions</title>
</head>
<body style="margin:0;padding:0;background-color:#f3f5fa;font-family:'Segoe UI',Helvetica,Arial,sans-serif;color:#f6f8ff;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f3f5fa;">
    <tr>
      <td align="center" style="padding:24px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;width:100%;background-color:#080d1a;border:1px solid rgba(243,196,0,0.28);border-radius:18px;">
          <tr>
            <td style="padding:22px 28px;background:linear-gradient(180deg,#041e42 0%,#080d1a 100%);border-radius:18px 18px 0 0;">
              <img src="https://mylder.mx/assets/logo-isotipo.png" alt="" width="36" height="36" style="display:block;margin:0 auto 10px;" />
              <p style="margin:0 auto 6px;text-align:center;font-size:21px;font-weight:800;letter-spacing:-0.03em;color:#ffffff;">MYLDER SOLUTIONS</p>
              <p style="margin:0;text-align:center;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#f3c400;">Nuevo contacto web</p>
            </td>
          </tr>
          <tr>
            <td style="padding:22px 28px;">
              <p style="margin:0 0 8px;font-size:14px;color:#e2eafc;"><strong style="color:#ffe7a0;">Nombre:</strong> {{NOMBRE}}</p>
              <p style="margin:0 0 8px;font-size:14px;color:#e2eafc;"><strong style="color:#ffe7a0;">Email:</strong> {{EMAIL}}</p>
              <p style="margin:0 0 8px;font-size:14px;color:#e2eafc;"><strong style="color:#ffe7a0;">Teléfono:</strong> {{TELEFONO}}</p>
              <p style="margin:0 0 8px;font-size:14px;color:#e2eafc;"><strong style="color:#ffe7a0;">Servicio:</strong> {{SERVICIO}}</p>
              <p style="margin:0 0 8px;font-size:14px;color:#e2eafc;"><strong style="color:#ffe7a0;">Origen:</strong> {{ORIGEN}}</p>
              <p style="margin:0 0 14px;font-size:14px;color:#e2eafc;"><strong style="color:#ffe7a0;">Canal:</strong> {{CANAL}}</p>
              <p style="margin:0;font-size:14px;line-height:1.55;color:#dbe4ff;white-space:pre-wrap;">{{MENSAJE}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px 22px;border-top:1px solid rgba(255,255,255,0.08);text-align:center;">
              <p style="margin:0 0 6px;font-size:13px;color:#a8b4d2;">Mylder Solutions · Alerta de formulario web</p>
              <p style="margin:0;font-size:12px;color:#8fa0c8;">
                <a href="mailto:{{EMAIL}}" style="color:#f3c400;text-decoration:none;">Responder a {{EMAIL}}</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
