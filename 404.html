<body class="legal-page thanks-page">
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PR9NJLZC" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div class="aurora-layer" aria-hidden="true"></div>
  <div class="noise"></div>

  <header class="header" id="inicio">
    <a class="brand" href="./index.html#inicio" aria-label="Ir al inicio">
      <img class="brand-mark" src="./assets/logo-isotipo.png" alt="Isotipo Mylder Solutions" />
      <span>MYLDER SOLUTIONS</span>
    </a>
  </header>

  <main class="thankyou-main">
    <article class="thankyou-card-tech">
      <p class="kicker">ERROR 404</p>
      <h1>Esta página no existe.</h1>
      <p>Te redirigimos al inicio en <span id="countdown">4</span> segundos.</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="./index.html#inicio">Ir al inicio ahora</a>
      </div>
    </article>
  </main>

  <footer class="footer">
    <div class="footer-bottom">
      <p>Mylder Solutions | <span class="js-current-year">2026</span> • Todos los derechos reservados.</p>
    </div>
  </footer>

  <script>
    document.querySelectorAll(".js-current-year").forEach((node) => {
      node.textContent = String(new Date().getFullYear());
    });

    const countdown = document.querySelector("#countdown");
    let seconds = 4;
    const timer = setInterval(() => {
      seconds -= 1;
      if (countdown) countdown.textContent = String(Math.max(0, seconds));
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.replace("./index.html#inicio");
      }
    }, 1000);
  </script>
